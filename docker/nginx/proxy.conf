# Nginx Proxy Configuration
# Common proxy settings for all upstream services

# Buffer settings for proxying
proxy_buffering on;
proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;

# Connection settings
proxy_connect_timeout 600s;
proxy_send_timeout 600s;
proxy_read_timeout 600s;

# Headers
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $server_name;
proxy_set_header X-Forwarded-Port $server_port;

# HTTP version and connection reuse
proxy_http_version 1.1;
proxy_set_header Connection "";

# Redirect handling
proxy_redirect off;
proxy_redirect ~^http://localhost:8000/ http://$host/;
proxy_redirect ~^http://127.0.0.1:8000/ http://$host/;

# WebSocket support
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# Cache settings (disable for API)
proxy_no_cache $http_pragma $http_authorization;
proxy_cache_bypass $http_pragma $http_authorization;
